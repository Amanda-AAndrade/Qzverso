<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qzverso - Login</title>
    <link rel="stylesheet" href="qzversologin.css">
</head>

<body>
    <section id="inicio">
        <img src="qzverso.jpg" width="300px" height="300px" alt="Logo do Qzverso" />
        <div class="content">
            <h1 class="title">Qzverso</h1>
            <h2 class="subtitle" id="resultado">Bem-vindo</h2>
        </div>

        <!-- Campos de Login -->
        <form action="login.php" method="POST">  <!-- Depois será trocado para um backend real -->
            <input type="email" placeholder="E-mail" id="email" name="email" required />
            <p>
                <input type="password" placeholder="Senha" id="senha" name="senha" required />
            </p>

            <!-- Botão de Login -->
            <button type="submit" class="secondary">Entrar</button>
        </form>

        <!-- Link para Cadastro -->
        <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se aqui</a></p>
    </section>

    <script src="qzversologin.js"></script>
</body>

</html>
