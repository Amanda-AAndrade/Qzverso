<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Alta | Qzverso</title>
    <link rel="stylesheet" href="emalta.css">
</head>
<body>
    <header>
        <h1>🔥 Em Alta</h1>
        <p>As histórias mais acessadas do momento</p>
    </header>

    <main class="historias-container">
        <div class="historia destaque" onclick="abrirHistoria('historia1')">
            <img src="capa1.jpg" alt="Capa da História">
            <div class="info">
                <h2>🔥 História Popular 1</h2>
                <p>Autor: </p>
                <span class="tag">Drama</span>
                <span class="tag">Concluída</span>
            </div>
        </div>

        <div class="historia destaque" onclick="abrirHistoria('historia2')">
            <img src="capa2.jpg" alt="Capa da História">
            <div class="info">
                <h2>🔥 História Popular 2</h2>
                <p>Autor: </p>
                <span class="tag">Suspense</span>
                <span class="tag">Em andamento</span>
            </div>
        </div>

        <!-- Mais histórias em alta -->
    </main>

    <footer>
        <p>&copy; 2025 Qzverso. Todos os direitos reservados.</p>
    </footer>

    <script src="emalta.js"></script>
</body>
</html>
