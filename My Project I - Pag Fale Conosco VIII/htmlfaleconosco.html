<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco | Qzverso</title>
    <link rel="stylesheet" href="stylefaleconosco.css">
</head>
<body>
    <header>
        <h1>📩 Fale Conosco</h1>
    </header>

    <main class="contato-container">
        <form id="contatoForm">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Seu nome" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email" placeholder="seuemail@exemplo.com" required>

            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" placeholder="Digite sua mensagem" required></textarea>

            <button type="submit">Enviar</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2025 Qzverso. Todos os direitos reservados.</p>
    </footer>

    <script src="jsfaleconosco.js"></script>
</body>
</html>
